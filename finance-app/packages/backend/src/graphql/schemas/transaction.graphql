enum TransactionType {
  INCOME
  EXPENSE
}

type Transaction {
  id: ID!
  description: String!
  amount: Float!
  type: TransactionType!
  date: String!
  category: Category!
  createdAt: String!
  updatedAt: String!
}

type Dashboard {
  balance: Float!
  incomes: Float!
  expenses: Float!
  transactions: [Transaction!]!
  categories: [CategoryStats!]!
}

type CategoryStats {
  name: String!
  total: Float!
  count: Int!
}

input CreateTransactionInput {
  description: String!
  amount: Float!
  type: TransactionType!
  date: String!
  categoryId: ID!
}

input UpdateTransactionInput {
  description: String
  amount: Float
  type: TransactionType
  date: String
  categoryId: ID
}

extend type Mutation {
  createTransaction(input: CreateTransactionInput!): Transaction!
  updateTransaction(id: ID!, input: UpdateTransactionInput!): Transaction!
  deleteTransaction(id: ID!): Boolean!
}

extend type Query {
  transactions: [Transaction!]!
  transaction(id: ID!): Transaction
  dashboard: Dashboard!
}