# render.yaml (na RAIZ do projeto, não dentro de packages)
services:
  - type: web
    name: finacy-backend
    runtime: node
    plan: free
    rootDir: packages/backend
    buildCommand: |
      cd ../..
      npm install -g pnpm
      pnpm install
      pnpm build:backend
    startCommand: pnpm start:backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finacy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://finacy-frontend-test.vercel.app
      - key: PNPM_HOME
        value: /opt/render/.pnpm

  - type: database
    name: finacy-db
    plan: free
